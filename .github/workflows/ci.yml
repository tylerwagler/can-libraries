name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build & test (Linux, ${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            flex \
            bison \
            zlib1g-dev

      - name: Set up vcan0 (for SocketCAN integration test)
        run: |
          # GitHub's ubuntu-24.04 Azure kernel base image ships without the
          # vcan module; pulling linux-modules-extra-<release> adds it.
          # If that package isn't available for the runner's kernel, fall
          # back gracefully — test_socketcan_live.cpp checks for vcan0 and
          # exits 77 (CTest "skip") when absent.
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          if sudo modprobe vcan 2>/dev/null; then
            sudo ip link add dev vcan0 type vcan
            # mtu 72 = CAN-FD frame size; required for the FD round-trip
            # case in test_socketcan_live. Classic-only frames work at the
            # default mtu (16) but we want FD coverage in CI.
            sudo ip link set vcan0 mtu 72
            sudo ip link set up vcan0
            ip link show vcan0
          else
            echo "::warning::vcan module unavailable on this runner; SocketCanLiveTest will skip"
          fi

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCAN_BACKEND_SOCKETCAN=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  sanitizers:
    name: Sanitizers (clang, ASAN + UBSAN)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            flex \
            bison \
            zlib1g-dev

      - name: Set up vcan0
        run: |
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          if sudo modprobe vcan 2>/dev/null; then
            sudo ip link add dev vcan0 type vcan
            sudo ip link set vcan0 mtu 72
            sudo ip link set up vcan0
          else
            echo "::warning::vcan module unavailable on this runner; SocketCanLiveTest will skip"
          fi

      - name: Configure with -fsanitize=address,undefined
        env:
          CC: clang
          CXX: clang++
          CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all
          CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all
          LDFLAGS: -fsanitize=address,undefined
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCAN_BACKEND_SOCKETCAN=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --output-on-failure

  static-build:
    name: Static build — BUILD_SHARED_LIBS=OFF
    runs-on: ubuntu-24.04
    # Locks in the L-6 cleanup: a static libcan + installed config must
    # export INTERFACE_LINK_LIBRARIES correctly for downstream consumers.
    # If a future change forgets to wrap a vendor SDK find_dependency in
    # CanLibrariesConfig.cmake.in, this job's install-and-find-package
    # leg will fail at configure.

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build flex bison zlib1g-dev

      - name: Set up vcan0
        run: |
          sudo apt-get install -y "linux-modules-extra-$(uname -r)" || true
          if sudo modprobe vcan 2>/dev/null; then
            sudo ip link add dev vcan0 type vcan
            sudo ip link set vcan0 mtu 72
            sudo ip link set up vcan0
          else
            echo "::warning::vcan module unavailable on this runner; SocketCanLiveTest will skip"
          fi

      - name: Configure (static)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCAN_BACKEND_SOCKETCAN=ON \
            -DCMAKE_INSTALL_PREFIX=$PWD/install

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Install
        run: cmake --install build

      - name: Verify installed package via find_package
        run: |
          mkdir -p consumer && cd consumer
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(downstream LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          find_package(CanLibraries REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE CanLibraries::can)
          EOF
          cat > main.cpp <<'EOF'
          #include "can/i_can_backend.h"
          int main() {
              auto kinds = can::ICanBackend::availableBackends();
              return kinds.empty() ? 1 : 0;
          }
          EOF
          cmake -S . -B build -G Ninja \
            -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/install
          cmake --build build
          ./build/consumer

  add-subdirectory-consumer:
    name: Downstream — add_subdirectory consumer
    runs-on: ubuntu-24.04
    # Mirrors how Qt_Template and other Crane apps pull in can-libraries.
    # Regression guard against breaking the _CANLIBS_TOPLEVEL detection
    # or the build-tree aliases (CanLibraries::can / ::dbc).

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: can-libraries

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build flex bison zlib1g-dev

      - name: Configure downstream consumer
        run: |
          mkdir -p parent && cd parent
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(parent LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 20)
          add_subdirectory(${CMAKE_SOURCE_DIR}/../can-libraries can-libraries)
          add_executable(parent_app main.cpp)
          target_link_libraries(parent_app PRIVATE CanLibraries::can CanLibraries::dbc)
          EOF
          cat > main.cpp <<'EOF'
          #include "can/i_can_backend.h"
          #include <Vector/DBC.h>
          int main() {
              auto kinds = can::ICanBackend::availableBackends();
              Vector::DBC::Network n;
              return kinds.empty() ? 1 : 0;
          }
          EOF
          cmake -S . -B build -G Ninja
          cmake --build build --parallel

      - name: Confirm subdir build skipped CanLibraries' own tests
        # When consumed via add_subdirectory, BUILD_TESTING and
        # CANLIB_BUILD_EXAMPLES default OFF — so the parent's build target
        # list should contain parent_app but not test_backend.
        working-directory: parent/build
        run: |
          if [ -e bin/test_backend ]; then
            echo "::error::test_backend built under add_subdirectory consumption (should be OFF by default)"
            exit 1
          fi
          if [ -e bin/backend_example ]; then
            echo "::error::backend_example built under add_subdirectory consumption (should be OFF by default)"
            exit 1
          fi
          echo "OK: tests + examples correctly suppressed in subdir consumption."

  vector-backend-gate:
    name: Regression guard — CAN_BACKEND_VECTOR=ON must fail configure
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        # Submodules aren't needed: the gate fires before any
        # add_subdirectory(third_party/...) runs.

      - name: Install minimal deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure with CAN_BACKEND_VECTOR=ON — expect FATAL_ERROR
        run: |
          set +e
          cmake -S . -B build -DCAN_BACKEND_VECTOR=ON 2>configure.log
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "::error::CAN_BACKEND_VECTOR=ON should fail configure but exit was 0"
            cat configure.log
            exit 1
          fi
          if ! grep -q "CAN_BACKEND_VECTOR is not yet implemented" configure.log; then
            echo "::error::Configure failed (rc=$rc) but not with the expected message"
            cat configure.log
            exit 1
          fi
          echo "OK: cmake exited $rc with the expected message."
